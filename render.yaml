services:
  # Full-stack service: builds frontend and serves via root index.js
  - type: web
    name: faisshon-ai-fullstack
    runtime: node
    buildCommand: npm install && npm install --prefix styleai --include=dev && npm install --prefix styleai/server && npm run build --prefix styleai
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  # Backend-only API service (styleai/server)
  - type: web
    name: faisshon-ai-api
    runtime: node
    rootDir: styleai/server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false

  # Static frontend only
  - type: web
    name: faisshon-ai-frontend
    runtime: static
    rootDir: styleai
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
